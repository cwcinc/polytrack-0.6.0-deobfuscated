<svg class="rank-badge" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg" style="color: #19a530;">
  <defs>
    <filter id="rank-shadow" x="-10%" y="-10%" width="130%" height="130%">
      <feDropShadow dx="2" dy="2" stdDeviation="0" flood-color="#000" flood-opacity="1"/>
    </filter>
  </defs>
  <text class="rank-label" x="50" y="60" text-anchor="middle"
        font-family="ForcedSquare, Arial, sans-serif" font-style="italic" font-size="40" font-weight="900"
        fill="#000" transform="translate(2, 2)">A+</text>
  <g filter="url(#rank-shadow)">
    <circle cx="50" cy="50" r="38" fill="currentColor" opacity="0.2"/>
    <circle cx="50" cy="50" r="38" fill="none" stroke="currentColor" stroke-width="5"/>
  </g>
  <text class="rank-label" x="50" y="60" text-anchor="middle"
        font-family="ForcedSquare, Arial, sans-serif" font-style="italic" font-size="40" font-weight="900"
        fill="currentColor">A+</text>
</svg>